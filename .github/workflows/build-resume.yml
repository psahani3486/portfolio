name: Build LaTeX Resume

on:
  push:
    paths:
      - 'resume.tex'
      - '**/*.tex'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build resume.pdf using LaTeX
        uses: xu-cheng/latex-action@v2
        with:
          root_file: resume.tex
          engine: pdflatex

      - name: Ensure public directory
        run: mkdir -p public

      - name: Move generated PDF to public/
        run: |
          if [ -f resume.pdf ]; then mv resume.pdf public/resume.pdf; fi

      - name: Upload resume artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume-pdf
          path: public/resume.pdf
